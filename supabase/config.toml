
[functions.clarify-issue]
enabled = true
verify_jwt = true
import_map = "./functions/clarify-issue/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/clarify-issue/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/clarify-issue/*.html" ]

# Gateway JWT check off: the handler validates `Authorization` with `auth.getUser(accessToken)`
# (avoids false "Invalid JWT" from the edge proxy while tokens are still valid for GoTrue).
[functions.submit-maintenance-request]
enabled = true
verify_jwt = false
import_map = "./functions/submit-maintenance-request/deno.json"
entrypoint = "./functions/submit-maintenance-request/index.ts"

